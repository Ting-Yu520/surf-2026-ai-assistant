<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; }

    #soccer-scene {
      width: 1280px; height: 720px;
      position: relative;
      background: linear-gradient(135deg, #0f5e2e 0%, #1a7a3e 40%, #0f5e2e 100%);
      font-family: 'Inter', 'Roboto', sans-serif;
      overflow: hidden;
    }

    /* Hidden by default — clip class controls visibility */
    .clip { visibility: hidden; }

    /* —— 球场元素 —— */
    .field-overlay {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 220px 340px at 60% 50%, transparent 95%, rgba(255,255,255,0.15) 96%),
        radial-gradient(circle 4px at 62% 50%, rgba(255,255,255,0.4) 95%, transparent 96%);
    }

    .penalty-box {
      position: absolute;
      left: 700px; top: 160px;
      width: 400px; height: 400px;
      border: 2px solid rgba(255,255,255,0.2);
    }

    .goal {
      position: absolute;
      left: 1080px; top: 280px;
      width: 30px; height: 160px;
      border: 3px solid rgba(255,255,255,0.5);
      border-left: none;
      background: rgba(255,255,255,0.05);
    }

    .goal-net {
      position: absolute;
      left: 1080px; top: 280px;
      width: 30px; height: 160px;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 8px,
        rgba(255,255,255,0.08) 8px, rgba(255,255,255,0.08) 9px
      );
    }

    /* —— 球员 —— */
    .player {
      position: absolute;
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: bold; color: white;
      z-index: 10;
      box-shadow: 0 0 8px rgba(0,0,0,0.4);
    }
    .player.attacker { background: #e74c3c; border: 2px solid #ff6b6b; }
    .player.defender { background: #3498db; border: 2px solid #5dade2; }
    .player.ball      { background: #f39c12; border: 2px solid #f7dc6f; width: 20px; height: 20px; }

    .player-label {
      position: absolute; top: -22px;
      white-space: nowrap;
      color: white; font-size: 12px; font-weight: bold;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    /* —— 高亮圈 —— */
    .highlight-ring {
      position: absolute; border-radius: 50%;
      border: 3px solid #ff4444;
      pointer-events: none; z-index: 20;
      box-shadow: 0 0 20px rgba(255,68,68,0.5);
    }

    /* —— 箭头 —— */
    .arrow-line {
      position: absolute; height: 3px; z-index: 15;
      background: linear-gradient(90deg, #ff6b6b, transparent);
      transform-origin: left center;
    }
    .arrow-head {
      position: absolute; z-index: 15;
      width: 0; height: 0;
      border-left: 12px solid #ff6b6b;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
    }

    /* —— 文字卡片 —— */
    .text-card {
      position: absolute;
      padding: 12px 20px;
      background: rgba(0,0,0,0.7);
      border-left: 4px solid #e74c3c;
      border-radius: 4px;
      color: white; font-size: 20px; font-weight: bold;
      z-index: 30;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .text-card .sub {
      font-size: 14px; font-weight: normal; color: #aaa; margin-top: 4px;
    }
    .text-card.highlight-yellow { border-left-color: #f1c40f; }
    .text-card.highlight-blue  { border-left-color: #3498db; }

    /* —— 标题 —— */
    /* 用 GSAP xPercent 做居中，避免 CSS transform 冲突 */
    .scene-title {
      position: absolute;
      top: 24px; left: 640px;  /* 640 = 1280/2 */
      padding: 8px 24px;
      background: rgba(0,0,0,0.6);
      border-radius: 20px;
      color: #fff; font-size: 16px; font-weight: bold;
      z-index: 40;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* —— 底部栏 —— */
    .bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 50px;
      background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
      z-index: 5;
    }
    .bottom-bar-text {
      position: absolute;
      bottom: 12px; left: 20px;
      color: rgba(255,255,255,0.6); font-size: 13px; z-index: 6;
    }

    /* —— 信息面板 —— */
    .info-panel {
      position: absolute;
      bottom: 70px; right: 24px;
      padding: 16px 20px;
      background: rgba(0,0,0,0.65);
      border-radius: 8px;
      color: white; font-size: 14px;
      z-index: 25;
      border: 1px solid rgba(255,255,255,0.08);
      min-width: 180px;
    }
    .info-panel .label { color: #aaa; font-size: 12px; }
    .info-panel .value { color: #f1c40f; font-size: 18px; font-weight: bold; }
    .info-panel .value.prob-high { color: #2ecc71; }
    .info-panel .value.prob-mid { color: #f39c12; }

    /* —— 左侧装饰条 —— */
    .side-ornament {
      position: absolute;
      left: 0; top: 0; width: 4px; height: 100%;
      background: linear-gradient(180deg, #e74c3c, #f39c12, #e74c3c);
      z-index: 3;
    }
  </style>
</head>
<body>
<div id="soccer-scene" data-composition-id="soccer-tactical"
     data-width="1280" data-height="720" data-start="0" data-duration="5">

  <!-- ===== 球场背景（始终可见，不 clip） ===== -->
  <div class="field-overlay"></div>

  <!-- 场景标题 -->
  <div id="scene-title" class="scene-title clip"
       data-track-index="0" data-start="0" data-duration="4.5">
    ⚽ 角球战术分析 — 近门柱站位
  </div>

  <!-- 底部信息 -->
  <div id="bottom-bar" class="bottom-bar clip"
       data-track-index="5" data-start="0" data-duration="5"></div>
  <div id="bottom-text" class="bottom-bar-text clip"
       data-track-index="6" data-start="0" data-duration="5">
    SURF-2026 AI Tactical Assistant · 角球战术 MG 动画实验
  </div>

  <!-- 装饰条 -->
  <div id="side-ornament" class="side-ornament clip"
       data-track-index="7" data-start="0" data-duration="5"></div>

  <!-- ===== 球场元素 ===== -->
  <div id="penalty-box" class="penalty-box clip"
       data-track-index="1" data-start="0" data-duration="5"></div>
  <div id="goal" class="goal clip"
       data-track-index="2" data-start="0.3" data-duration="4.7"></div>
  <div id="goal-net" class="goal-net clip"
       data-track-index="3" data-start="0.3" data-duration="4.7"></div>

  <!-- ===== 球员 ===== -->
  <div id="player-messi" class="player attacker clip"
       style="left:930px; top:310px;" data-track-index="10" data-start="0.5" data-duration="4.5"></div>
  <span id="label-messi" class="player-label clip"
        style="left:918px; top:288px;" data-track-index="11" data-start="1.0" data-duration="4">
    梅西 10
  </span>

  <div id="att-2" class="player attacker clip"
       style="left:840px; top:230px;" data-track-index="12" data-start="0.8" data-duration="4.2"></div>
  <div id="att-3" class="player attacker clip"
       style="left:800px; top:370px;" data-track-index="13" data-start="0.8" data-duration="4.2"></div>
  <div id="att-4" class="player attacker clip"
       style="left:880px; top:420px;" data-track-index="14" data-start="0.8" data-duration="4.2"></div>
  <div id="att-5" class="player attacker clip"
       style="left:750px; top:300px;" data-track-index="15" data-start="1.0" data-duration="4"></div>

  <div id="def-1" class="player defender clip"
       style="left:1000px; top:300px;" data-track-index="20" data-start="0.8" data-duration="4.2"></div>
  <div id="def-2" class="player defender clip"
       style="left:960px; top:240px;" data-track-index="21" data-start="0.8" data-duration="4.2"></div>
  <div id="def-3" class="player defender clip"
       style="left:960px; top:370px;" data-track-index="22" data-start="0.8" data-duration="4.2"></div>
  <div id="def-4" class="player defender clip"
       style="left:1060px; top:330px;" data-track-index="23" data-start="0.8" data-duration="4.2"></div>
  <div id="def-5" class="player defender clip"
       style="left:900px; top:280px;" data-track-index="24" data-start="1.0" data-duration="4"></div>

  <div id="ball" class="player ball clip"
       style="left:1095px; top:360px;" data-track-index="25" data-start="0.5" data-duration="4.5"></div>

  <!-- ===== 高亮圈 ===== -->
  <div id="highlight-near-post" class="highlight-ring clip"
       style="left:920px; top:300px; width:50px; height:50px;"
       data-track-index="30" data-start="1.0" data-duration="3"></div>
  <div id="highlight-ball" class="highlight-ring clip"
       style="left:1090px; top:350px; width:40px; height:40px; border-color:#f1c40f;"
       data-track-index="31" data-start="1.0" data-duration="2.5"></div>

  <!-- ===== 箭头 ===== -->
  <div id="arrow-line" class="arrow-line clip"
       style="left:940px; top:348px; width:120px;"
       data-track-index="40" data-start="1.5" data-duration="2.3"></div>
  <div id="arrow-head" class="arrow-head clip"
       style="left:1048px; top:342px;"
       data-track-index="41" data-start="1.5" data-duration="2.3"></div>

  <!-- ===== 文字卡片 ===== -->
  <div id="card-1" class="text-card clip" style="left:60px; top:140px;"
       data-track-index="50" data-start="0.5" data-duration="2">
    近门柱
    <div class="sub">离球最近的球门柱</div>
  </div>

  <div id="card-2" class="text-card highlight-yellow clip" style="left:60px; top:260px;"
       data-track-index="51" data-start="2.0" data-duration="2">
    内旋球路线
    <div class="sub">球往球门方向旋转 · 守门员不敢碰</div>
  </div>

  <div id="card-3" class="text-card highlight-blue clip" style="left:60px; top:400px;"
       data-track-index="52" data-start="3.5" data-duration="1.5">
    TacticAI 预测
    <div class="sub">梅西接球概率 42% · 防守已到位</div>
  </div>

  <!-- ===== 数据面板 ===== -->
  <div id="info-panel" class="info-panel clip" style="bottom:80px; right:24px;"
       data-track-index="60" data-start="1.0" data-duration="4">
    <div class="label">最可能接球</div>
    <div class="value prob-high">42%</div>
    <div style="margin-top:8px; border-top:1px solid rgba(255,255,255,0.1); padding-top:8px;">
      <div class="label">防守封堵率</div>
      <div class="value prob-mid">68%</div>
    </div>
  </div>

</div>

<!-- GSAP CDN（HyperFrames 不自动包含） -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>

<script>
  (function() {
    var tl = gsap.timeline({ paused: true });

    // —— 场景标题（xPercent=-50 居中，y 动画不冲突） ——
    tl.fromTo('#scene-title',
      { opacity: 0, y: -10, xPercent: -50 },
      { opacity: 1, y: 0, xPercent: -50, duration: 0.5, ease: 'power2.out' }, 0);
    tl.to('#scene-title',
      { opacity: 0, y: -15, duration: 0.4, ease: 'power2.in' }, 4.1);

    // —— 底部栏 + 装饰 ——
    tl.fromTo('#bottom-bar', { opacity: 0 }, { opacity: 1, duration: 0.3 }, 0);
    tl.fromTo('#bottom-text', { opacity: 0 }, { opacity: 1, duration: 0.4 }, 0.5);
    tl.fromTo('#side-ornament', { opacity: 0, scaleY: 0 },
      { opacity: 1, scaleY: 1, duration: 0.4, ease: 'power2.out' }, 0.2);

    // —— 球场元素渐入 ——
    tl.fromTo('#penalty-box',
      { opacity: 0, scale: 0.95 },
      { opacity: 1, scale: 1, duration: 0.5, ease: 'power2.out' }, 0.3);
    tl.fromTo('#goal',
      { opacity: 0, x: -10 }, { opacity: 1, x: 0, duration: 0.5 }, 0.5);
    tl.fromTo('#goal-net',
      { opacity: 0 }, { opacity: 1, duration: 0.4 }, 0.6);

    // —— 球员弹性出现 ——
    tl.fromTo('.player.attacker',
      { opacity: 0, scale: 0 },
      { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(2)', stagger: 0.1 }, 0.6);
    tl.fromTo('.player.defender',
      { opacity: 0, scale: 0 },
      { opacity: 1, scale: 1, duration: 0.35, ease: 'back.out(2)', stagger: 0.08 }, 0.9);
    tl.fromTo('#ball',
      { opacity: 0, scale: 0 },
      { opacity: 1, scale: 1, duration: 0.3, ease: 'back.out(3)' }, 0.6);
    tl.fromTo('#label-messi',
      { opacity: 0, y: 4 }, { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' }, 1.0);

    // —— 高亮圈脉冲 ——
    tl.fromTo('#highlight-near-post',
      { opacity: 0, scale: 0.5 },
      { opacity: 0.9, scale: 1.2, duration: 0.5, ease: 'power2.out' }, 1.2);
    tl.to('#highlight-near-post',
      { scale: 0.9, opacity: 0.7, duration: 0.5, ease: 'sine.inOut' }, 1.7);
    tl.to('#highlight-near-post',
      { scale: 1.1, opacity: 0.9, duration: 0.5, ease: 'sine.inOut' }, 2.2);
    tl.to('#highlight-near-post',
      { opacity: 0, scale: 0.3, duration: 0.5 }, 3.7);

    tl.fromTo('#highlight-ball',
      { opacity: 0, scale: 0.5 },
      { opacity: 0.8, scale: 1.3, duration: 0.5 }, 1.2);
    tl.to('#highlight-ball',
      { opacity: 0, scale: 0.3, duration: 0.5 }, 3.2);

    // —— 箭头动画 ——
    tl.fromTo('#arrow-line',
      { opacity: 0, scaleX: 0 },
      { opacity: 0.9, scaleX: 1, duration: 0.5, ease: 'power2.out' }, 1.8);
    tl.fromTo('#arrow-head',
      { opacity: 0, x: -10 }, { opacity: 0.9, x: 0, duration: 0.3, ease: 'power2.out' }, 1.9);
    tl.to('#arrow-line', { opacity: 0.3, duration: 0.3 }, 3.5);
    tl.to('#arrow-head', { opacity: 0.3, duration: 0.3 }, 3.5);

    // —— 文字卡片错落渐入 ——
    tl.fromTo('#card-1',
      { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.4, ease: 'power2.out' }, 0.8);
    tl.fromTo('#card-2',
      { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.4, ease: 'power2.out' }, 2.3);
    tl.fromTo('#card-3',
      { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.4, ease: 'power2.out' }, 3.8);
    tl.to('#card-1',
      { opacity: 0, x: -10, duration: 0.3 }, 2.8);
    tl.to('#card-2',
      { opacity: 0, x: -10, duration: 0.3 }, 4.3);

    // —— 数据面板 ——
    tl.fromTo('#info-panel',
      { opacity: 0, x: 10 }, { opacity: 1, x: 0, duration: 0.4, ease: 'power2.out' }, 1.2);
    tl.fromTo('#info-panel .value',
      { opacity: 0, scale: 0.5 },
      { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(2)', stagger: 0.2 }, 1.5);

    // 注册
    window.__timelines = window.__timelines || {};
    window.__timelines['soccer-tactical'] = tl;
  })();
</script>
</body>
</html>
