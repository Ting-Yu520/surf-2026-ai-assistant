<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    /* ========== 全局 ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; }

    /* ========== 合成根容器 ========== */
    #soccer-scene {
      width: 1280px; height: 720px;
      position: relative;
      background: linear-gradient(135deg, #0f5e2e 0%, #1a7a3e 40%, #0f5e2e 100%);
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
    }

    /* ========== 球场元素 ========== */
    .field-overlay {
      position: absolute; inset: 0;
      background:
        /* 禁区轮廓 */
        radial-gradient(ellipse 220px 340px at 60% 50%, transparent 95%, rgba(255,255,255,0.15) 96%),
        /* 罚球点 */
        radial-gradient(circle 4px at 62% 50%, rgba(255,255,255,0.4) 95%, transparent 96%);
    }

    .penalty-box {
      position: absolute;
      left: 700px; top: 160px;
      width: 400px; height: 400px;
      border: 2px solid rgba(255,255,255,0.2);
    }

    .goal {
      position: absolute;
      left: 1080px; top: 280px;
      width: 30px; height: 160px;
      border: 3px solid rgba(255,255,255,0.5);
      border-left: none;
      background: rgba(255,255,255,0.05);
    }

    .goal-net {
      position: absolute;
      left: 1080px; top: 280px;
      width: 30px; height: 160px;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 8px,
        rgba(255,255,255,0.08) 8px, rgba(255,255,255,0.08) 9px
      );
    }

    /* ========== 球员标记 ========== */
    .player {
      position: absolute;
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      color: white;
      z-index: 10;
      box-shadow: 0 0 8px rgba(0,0,0,0.4);
      opacity: 0; /* GSAP 控制渐入 */
    }
    .player.attacker { background: #e74c3c; border: 2px solid #ff6b6b; }
    .player.defender { background: #3498db; border: 2px solid #5dade2; }
    .player.ball      { background: #f39c12; border: 2px solid #f7dc6f; width: 20px; height: 20px; }

    .player-label {
      position: absolute;
      top: -22px;
      white-space: nowrap;
      color: white;
      font-size: 12px;
      font-weight: bold;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      opacity: 0;
    }

    /* ========== 高亮元素 ========== */
    .highlight-ring {
      position: absolute;
      border-radius: 50%;
      border: 3px solid #ff4444;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      box-shadow: 0 0 20px rgba(255,68,68,0.5);
    }

    .arrow-line {
      position: absolute;
      height: 3px;
      background: linear-gradient(90deg, #ff6b6b, transparent);
      opacity: 0;
      z-index: 15;
      transform-origin: left center;
    }

    .arrow-head {
      position: absolute;
      width: 0; height: 0;
      border-left: 12px solid #ff6b6b;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      opacity: 0;
      z-index: 15;
    }

    /* ========== 文字卡片 ========== */
    .text-card {
      position: absolute;
      padding: 12px 20px;
      background: rgba(0,0,0,0.7);
      border-left: 4px solid #e74c3c;
      border-radius: 4px;
      color: white;
      font-size: 20px;
      font-weight: bold;
      z-index: 30;
      backdrop-filter: blur(4px);
      opacity: 0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    .text-card .sub {
      font-size: 14px;
      font-weight: normal;
      color: #aaa;
      margin-top: 4px;
    }

    .text-card.highlight-yellow { border-left-color: #f1c40f; }
    .text-card.highlight-blue  { border-left-color: #3498db; }

    /* ========== 标题 ========== */
    .scene-title {
      position: absolute;
      top: 24px; left: 50%;
      transform: translateX(-50%);
      padding: 8px 24px;
      background: rgba(0,0,0,0.6);
      border-radius: 20px;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      z-index: 40;
      opacity: 0;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* ========== 底部信息 ========== */
    .bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50px;
      background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
      z-index: 5;
      opacity: 0;
    }

    .bottom-bar-text {
      position: absolute;
      bottom: 12px; left: 20px;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      z-index: 6;
      opacity: 0;
    }

    /* ========== 数字人/信息面板 ========== */
    .info-panel {
      position: absolute;
      bottom: 70px; right: 24px;
      padding: 16px 20px;
      background: rgba(0,0,0,0.65);
      border-radius: 8px;
      color: white;
      font-size: 14px;
      z-index: 25;
      opacity: 0;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.08);
      min-width: 180px;
    }

    .info-panel .label { color: #aaa; font-size: 12px; }
    .info-panel .value { color: #f1c40f; font-size: 18px; font-weight: bold; }
    .info-panel .value.prob-low { color: #e74c3c; }
    .info-panel .value.prob-mid { color: #f39c12; }
    .info-panel .value.prob-high { color: #2ecc71; }

    /* ========== 边框装饰 ========== */
    .side-ornament {
      position: absolute;
      left: 0; top: 0;
      width: 4px; height: 100%;
      background: linear-gradient(180deg, #e74c3c, #f39c12, #e74c3c);
      z-index: 3;
      opacity: 0;
    }
  </style>
</head>
<body>
<div id="soccer-scene" data-composition-id="soccer-tactical" data-duration="5">

  <!-- ===== 球场背景 ===== -->
  <div class="field-overlay" clip-path></div>

  <!-- 场景标题（渐入 + 悬停） -->
  <div class="scene-title" data-track-index="0" data-start="0" data-end="4.5">
    ⚽ 角球战术分析 — 近门柱站位
  </div>

  <!-- 底部信息栏 -->
  <div class="bottom-bar" data-track-index="5" data-start="0" data-end="5"></div>
  <div class="bottom-bar-text" data-track-index="6" data-start="0" data-end="5">
    SURF-2026 AI Tactical Assistant · 角球战术 MG 动画实验
  </div>

  <!-- 左侧装饰条 -->
  <div class="side-ornament" data-track-index="7" data-start="0" data-end="5"></div>

  <!-- ===== 球场元素 ===== -->
  <div class="penalty-box" data-track-index="1" data-start="0" data-end="5"></div>
  <div class="goal" data-track-index="2" data-start="0.3" data-end="5"></div>
  <div class="goal-net" data-track-index="3" data-start="0.3" data-end="5"></div>

  <!-- ===== 球员 ===== -->
  <!-- 梅西（进攻方，近门柱位置） -->
  <div class="player attacker" style="left:930px; top:310px;" data-track-index="10" data-start="0.5">
    <span class="player-label" data-track-index="11" data-start="0.8">梅西 10</span>
  </div>

  <!-- 其他进攻球员 -->
  <div class="player attacker" style="left:840px; top:230px;" data-track-index="12" data-start="0.8"></div>
  <div class="player attacker" style="left:800px; top:370px;" data-track-index="13" data-start="0.8"></div>
  <div class="player attacker" style="left:880px; top:420px;" data-track-index="14" data-start="0.8"></div>
  <div class="player attacker" style="left:750px; top:300px;" data-track-index="15" data-start="1.0"></div>

  <!-- 防守球员 -->
  <div class="player defender" style="left:1000px; top:300px;" data-track-index="20" data-start="0.8"></div>
  <div class="player defender" style="left:960px; top:240px;" data-track-index="21" data-start="0.8"></div>
  <div class="player defender" style="left:960px; top:370px;" data-track-index="22" data-start="0.8"></div>
  <div class="player defender" style="left:1060px; top:330px;" data-track-index="23" data-start="0.8"></div>
  <div class="player defender" style="left:900px; top:280px;" data-track-index="24" data-start="1.0"></div>

  <!-- 足球 -->
  <div class="player ball" style="left:1095px; top:360px;" data-track-index="25" data-start="0.5"></div>

  <!-- ===== 高亮圈（近门柱位置） ===== -->
  <div class="highlight-ring"
       style="left:920px; top:300px; width:50px; height:50px;"
       data-track-index="30" data-start="1.0" data-end="4.0"></div>

  <div class="highlight-ring"
       style="left:1090px; top:350px; width:40px; height:40px; border-color:#f1c40f;"
       data-track-index="31" data-start="1.0" data-end="3.5"></div>

  <!-- ===== 箭头指示 ===== -->
  <div class="arrow-line"
       style="left:940px; top:348px; width:120px;"
       data-track-index="40" data-start="1.5" data-end="3.8"></div>
  <div class="arrow-head"
       style="left:1048px; top:342px;"
       data-track-index="41" data-start="1.5" data-end="3.8"></div>

  <!-- ===== 文字卡片 ===== -->
  <div class="text-card" style="left:60px; top:140px;"
       data-track-index="50" data-start="0.5" data-end="2.5">
    近门柱
    <div class="sub">离球最近的球门柱</div>
  </div>

  <div class="text-card highlight-yellow" style="left:60px; top:260px;"
       data-track-index="51" data-start="2.0" data-end="4.0">
    内旋球路线
    <div class="sub">球往球门方向旋转 · 守门员不敢碰</div>
  </div>

  <div class="text-card highlight-blue" style="left:60px; top:400px;"
       data-track-index="52" data-start="3.5" data-end="5.0">
    TacticAI 预测
    <div class="sub">梅西接球概率 42% · 防守已到位</div>
  </div>

  <!-- ===== 数据信息面板 ===== -->
  <div class="info-panel" style="bottom:80px; right:24px;"
       data-track-index="60" data-start="1.0" data-end="5.0">
    <div class="label">最可能接球</div>
    <div class="value prob-high">42%</div>
    <div style="margin-top:8px; border-top:1px solid rgba(255,255,255,0.1); padding-top:8px;">
      <div class="label">防守封堵率</div>
      <div class="value prob-mid">68%</div>
    </div>
  </div>

</div>

<script>
  // 注册 GSAP 时间线（HyperFrames 合成契约）
  (function() {
    var tl = gsap.timeline({ paused: true });

    // —— 场景标题 ——
    tl.fromTo('.scene-title', { opacity: 0, y: -10 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' }, 0);
    tl.to('.scene-title', { opacity: 0, y: -15, duration: 0.4, ease: 'power2.in' }, 4.1);

    // —— 底部栏 ——
    tl.fromTo('.bottom-bar', { opacity: 0 }, { opacity: 1, duration: 0.3 }, 0);
    tl.fromTo('.bottom-bar-text', { opacity: 0 }, { opacity: 1, duration: 0.4 }, 0.5);

    // —— 左侧装饰条 ——
    tl.fromTo('.side-ornament', { opacity: 0, scaleY: 0 }, { opacity: 1, scaleY: 1, duration: 0.4, ease: 'power2.out' }, 0.2);

    // —— 球场元素 ——
    tl.fromTo('.penalty-box', { opacity: 0, scale: 0.95 }, { opacity: 1, scale: 1, duration: 0.5, ease: 'power2.out' }, 0.3);
    tl.fromTo('.goal', { opacity: 0, x: -10 }, { opacity: 1, x: 0, duration: 0.5 }, 0.5);
    tl.fromTo('.goal-net', { opacity: 0 }, { opacity: 1, duration: 0.4 }, 0.6);

    // —— 球员渐入 + 弹性效果 ——
    tl.fromTo('.player.attacker', { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(2)', stagger: 0.1 }, 0.6);
    tl.fromTo('.player.defender', { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.35, ease: 'back.out(2)', stagger: 0.08 }, 0.9);
    tl.fromTo('.player.ball', { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.3, ease: 'back.out(3)' }, 0.6);

    // —— 球员标签 ——
    tl.fromTo('.player-label', { opacity: 0, y: 4 }, { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' }, 1.0);

    // —— 高亮圈（脉冲动画） ——
    tl.fromTo('.highlight-ring', { opacity: 0, scale: 0.5 }, { opacity: 0.9, scale: 1.2, duration: 0.5, ease: 'power2.out' }, 1.2);
    tl.to('.highlight-ring', { scale: 0.9, opacity: 0.7, duration: 0.5, ease: 'sine.inOut' }, 1.7);
    tl.to('.highlight-ring', { scale: 1.1, opacity: 0.9, duration: 0.5, ease: 'sine.inOut' }, 2.2);
    tl.to('.highlight-ring', { scale: 0.8, opacity: 0.4, duration: 0.5, ease: 'sine.inOut' }, 2.7);
    tl.to('.highlight-ring', { scale: 1.0, opacity: 0.8, duration: 0.5, ease: 'sine.inOut' }, 3.2);
    tl.to('.highlight-ring', { opacity: 0, scale: 0.3, duration: 0.3 }, 3.7);

    // —— 第二高亮圈（球门区） ——
    tl.fromTo('.highlight-ring:nth-child(2)', { opacity: 0, scale: 0.5 }, { opacity: 0.8, scale: 1.3, duration: 0.5 }, 1.2);
    tl.to('.highlight-ring:nth-child(2)', { scale: 0.9, opacity: 0.5, duration: 0.6, ease: 'sine.inOut' }, 1.7);
    tl.to('.highlight-ring:nth-child(2)', { scale: 1.1, opacity: 0.8, duration: 0.6, ease: 'sine.inOut' }, 2.3);
    tl.to('.highlight-ring:nth-child(2)', { opacity: 0, scale: 0.3, duration: 0.4 }, 3.2);

    // —— 箭头动画 ——
    tl.fromTo('.arrow-line', { opacity: 0, scaleX: 0 }, { opacity: 0.9, scaleX: 1, duration: 0.5, ease: 'power2.out' }, 1.8);
    tl.fromTo('.arrow-head', { opacity: 0, x: -10 }, { opacity: 0.9, x: 0, duration: 0.3, ease: 'power2.out' }, 1.9);
    tl.to('.arrow-line', { opacity: 0.3, duration: 0.3 }, 3.5);
    tl.to('.arrow-head', { opacity: 0.3, duration: 0.3 }, 3.5);

    // —— 文字卡片（错落渐入） ——
    tl.fromTo('.text-card:nth-child(1)', { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.4, ease: 'power2.out' }, 0.8);
    tl.fromTo('.text-card:nth-child(2)', { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.4, ease: 'power2.out' }, 2.3);
    tl.fromTo('.text-card:nth-child(3)', { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.4, ease: 'power2.out' }, 3.8);
    tl.to('.text-card:nth-child(1)', { opacity: 0, x: -10, duration: 0.3 }, 2.8);
    tl.to('.text-card:nth-child(2)', { opacity: 0, x: -10, duration: 0.3 }, 4.3);

    // —— 数据面板 ——
    tl.fromTo('.info-panel', { opacity: 0, x: 10 }, { opacity: 1, x: 0, duration: 0.4, ease: 'power2.out' }, 1.2);
    tl.fromTo('.info-panel .value', { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(2)', stagger: 0.2 }, 1.5);

    // —— 注册时间线 ——
    window.__timelines = window.__timelines || {};
    window.__timelines['soccer-tactical'] = tl;
  })();
</script>
</body>
</html>
