<!DOCTYPE html>
<html lang="zh-CN" data-composition-variables='[
  {"id":"players","type":"string","label":"Players JSON","default":"[]"},
  {"id":"ball","type":"string","label":"Ball position JSON","default":"{\"x\":0,\"y\":0}"},
  {"id":"highlight","type":"string","label":"Highlight JSON","default":"{\"x\":0,\"y\":0,\"label\":\"\"}"},
  {"id":"arrow","type":"string","label":"Arrow JSON","default":"{\"from_x\":0,\"from_y\":0,\"to_x\":0,\"to_y\":0,\"label\":\"\"}"},
  {"id":"cards","type":"string","label":"Cards JSON","default":"[]"},
  {"id":"title","type":"string","label":"Title","default":"⚽ 角球战术分析"},
  {"id":"duration","type":"number","label":"Duration (seconds)","default":3}
]'>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px;
    background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d1f3c 100%);
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    overflow: hidden;
    position: relative;
  }
  /* 球场背景 */
  .pitch {
    position: absolute;
    left: 60px; top: 80px;
    width: 1080px; height: 560px;
    background: linear-gradient(180deg, #1a5c2a 0%, #1e7030 30%, #1a5c2a 100%);
    border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.15);
    box-shadow: inset 0 0 80px rgba(0,0,0,0.3);
  }
  .pitch::before {
    content: '';
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 2px; background: rgba(255,255,255,0.08);
  }
  .pitch::after {
    content: '';
    position: absolute;
    left: 10%; right: 10%; top: 50%;
    height: 2px; background: rgba(255,255,255,0.08);
  }
  /* 球员 */
  .player {
    position: absolute;
    width: 28px; height: 28px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: none;
    z-index: 10;
  }
  .player.attacker {
    background: radial-gradient(circle at 40% 35%, #ff6b6b, #c0392b);
    box-shadow: 0 0 12px rgba(255,80,80,0.5), 0 2px 4px rgba(0,0,0,0.4);
    border: 2px solid #ff9999;
  }
  .player.defender {
    background: radial-gradient(circle at 40% 35%, #5b9bd5, #2c5f8a);
    box-shadow: 0 0 10px rgba(80,140,255,0.4), 0 2px 4px rgba(0,0,0,0.4);
    border: 2px solid #7ab8f5;
  }
  .player.top-attacker {
    width: 36px; height: 36px;
    box-shadow: 0 0 24px rgba(255,200,50,0.8), 0 0 48px rgba(255,150,0,0.4), 0 2px 4px rgba(0,0,0,0.4);
    border: 3px solid #ffd700;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 24px rgba(255,200,50,0.8), 0 0 48px rgba(255,150,0,0.4); }
    50% { box-shadow: 0 0 36px rgba(255,200,50,1), 0 0 64px rgba(255,150,0,0.7); }
  }
  .player-label {
    position: absolute;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 10px;
    font-weight: bold;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    white-space: nowrap;
    pointer-events: none;
  }
  /* 球 */
  .ball-dot {
    position: absolute;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, #ddd);
    box-shadow: 0 0 8px rgba(255,255,255,0.6), 0 2px 3px rgba(0,0,0,0.4);
    transform: translate(-50%, -50%);
    z-index: 15;
  }
  /* 高亮圈 */
  .highlight-ring {
    position: absolute;
    width: 50px; height: 50px;
    border-radius: 50%;
    border: 3px dashed #ffd700;
    transform: translate(-50%, -50%);
    z-index: 20;
    animation: highlight-pulse 2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes highlight-pulse {
    0%, 100% { border-color: rgba(255,215,0,0.8); box-shadow: 0 0 20px rgba(255,215,0,0.3); }
    50% { border-color: rgba(255,215,0,0.3); box-shadow: 0 0 40px rgba(255,215,0,0.6); }
  }
  .highlight-label {
    position: absolute;
    top: 32px; left: 50%;
    transform: translateX(-50%);
    color: #ffd700;
    font-size: 11px;
    font-weight: bold;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    white-space: nowrap;
    pointer-events: none;
  }
  /* 箭头 */
  .arrow-line {
    position: absolute;
    height: 3px;
    background: linear-gradient(90deg, rgba(255,255,255,0.9), rgba(255,215,0,0.9));
    transform-origin: left center;
    z-index: 5;
    box-shadow: 0 0 8px rgba(255,215,0,0.5);
  }
  .arrow-head {
    position: absolute;
    width: 0; height: 0;
    border-left: 12px solid #ffd700;
    border-top: 8px solid transparent;
    border-bottom: 8px solid transparent;
    z-index: 6;
  }
  .arrow-label {
    position: absolute;
    color: rgba(255,255,255,0.85);
    font-size: 11px;
    font-weight: bold;
    transform: translate(-50%, -50%);
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    white-space: nowrap;
    pointer-events: none;
    z-index: 7;
  }
  /* 标题 */
  .scene-title {
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 26px;
    font-weight: bold;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    z-index: 30;
    letter-spacing: 2px;
  }
  /* 卡片 */
  .cards-area {
    position: absolute;
    right: 20px; top: 100px;
    width: 180px;
    z-index: 25;
  }
  .card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 8px;
  }
  .card.term .card-title { color: #7ab8f5; font-size: 13px; font-weight: bold; }
  .card.term .card-sub { color: rgba(255,255,255,0.6); font-size: 11px; margin-top: 2px; }
  .card.data .card-title { color: rgba(255,255,255,0.7); font-size: 11px; }
  .card.data .card-value { color: #ffd700; font-size: 22px; font-weight: bold; margin-top: 2px; }
  /* 淡入动画 */
  .clip {
    animation: fadeIn 0.4s ease-out both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  .clip-no-transform {
    animation: fadeInSimple 0.4s ease-out both;
  }
  @keyframes fadeInSimple {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div id="root" data-composition-id="root" data-width="1280" data-height="720" data-duration="30">

  <!-- 标题 -->
  <div class="scene-title clip-no-transform" data-start="0" data-duration="99" id="title-el"></div>

  <!-- 球场 -->
  <div class="pitch clip-no-transform" data-start="0" data-duration="99" id="pitch-el"></div>

  <!-- 动态内容由 JS 填充 -->
  <div id="dynamic-layer"></div>

  <!-- 卡片区 -->
  <div class="cards-area clip-no-transform" data-start="0.3" data-duration="99" id="cards-area"></div>

</div>

<script>
(function() {
  const vars = window.__hyperframes.getVariables();

  // 解析 JSON 字段
  function parseJSON(v, fallback) {
    if (typeof v === 'string') {
      try { return JSON.parse(v); } catch(e) { return fallback; }
    }
    return v || fallback;
  }

  const players = parseJSON(vars.players, []);
  const ball = parseJSON(vars.ball, {x:0, y:0});
  const highlight = parseJSON(vars.highlight, {x:0, y:0, label:''});
  const arrow = parseJSON(vars.arrow, {from_x:0, from_y:0, to_x:0, to_y:0, label:''});
  const cards = parseJSON(vars.cards, []);
  const title = vars.title || '⚽ 角球战术分析';
  const duration = parseFloat(vars.duration) || 3;

  // 设置标题
  document.getElementById('title-el').textContent = title;

  // 更新所有 clip 元素的 duration
  document.querySelectorAll('[data-duration="99"]').forEach(el => {
    el.setAttribute('data-duration', String(Math.max(duration, 3)));
  });

  const layer = document.getElementById('dynamic-layer');

  // 渲染球员
  players.forEach(function(p) {
    const div = document.createElement('div');
    div.className = 'player ' + (p.is_top ? 'top-attacker' : '') + ' ' + (p.role || '') + ' clip';
    div.setAttribute('data-start', '0.2');
    div.setAttribute('data-duration', String(Math.max(duration - 0.2, 2.8)));
    div.style.left = p.x + 'px';
    div.style.top = p.y + 'px';
    div.title = (p.label || '') + ' (' + (p.probability ? (p.probability*100).toFixed(0)+'%' : '') + ')';

    if (p.label) {
      const label = document.createElement('span');
      label.className = 'player-label';
      label.textContent = p.label;
      div.appendChild(label);
    }
    layer.appendChild(div);
  });

  // 渲染球
  if (ball.x > 0 || ball.y > 0) {
    const ballEl = document.createElement('div');
    ballEl.className = 'ball-dot clip';
    ballEl.setAttribute('data-start', '0.1');
    ballEl.setAttribute('data-duration', String(Math.max(duration - 0.1, 2.9)));
    ballEl.style.left = ball.x + 'px';
    ballEl.style.top = ball.y + 'px';
    layer.appendChild(ballEl);
  }

  // 渲染箭头
  if (arrow.from_x > 0 && arrow.to_x > 0) {
    const dx = arrow.to_x - arrow.from_x;
    const dy = arrow.to_y - arrow.from_y;
    const length = Math.sqrt(dx*dx + dy*dy);
    const angle = Math.atan2(dy, dx) * 180 / Math.PI;

    if (length > 5) {
      // 线
      const line = document.createElement('div');
      line.className = 'arrow-line clip';
      line.setAttribute('data-start', '0.5');
      line.setAttribute('data-duration', String(Math.max(duration - 0.5, 2.5)));
      line.style.left = arrow.from_x + 'px';
      line.style.top = arrow.from_y + 'px';
      line.style.width = (length - 10) + 'px';
      line.style.transform = 'rotate(' + angle + 'deg)';
      layer.appendChild(line);

      // 箭头
      const head = document.createElement('div');
      head.className = 'arrow-head clip';
      head.setAttribute('data-start', '0.5');
      head.setAttribute('data-duration', String(Math.max(duration - 0.5, 2.5)));
      head.style.left = (arrow.to_x - 6) + 'px';
      head.style.top = (arrow.to_y - 8) + 'px';
      head.style.transform = 'rotate(' + (angle + 90) + 'deg)';
      layer.appendChild(head);

      // 标签
      if (arrow.label) {
        const alabel = document.createElement('div');
        alabel.className = 'arrow-label clip';
        alabel.setAttribute('data-start', '0.6');
        alabel.setAttribute('data-duration', String(Math.max(duration - 0.6, 2.4)));
        alabel.style.left = ((arrow.from_x + arrow.to_x) / 2) + 'px';
        alabel.style.top = ((arrow.from_y + arrow.to_y) / 2 - 18) + 'px';
        alabel.textContent = arrow.label;
        layer.appendChild(alabel);
      }
    }
  }

  // 渲染高亮
  if (highlight.x > 0 && highlight.y > 0) {
    const ring = document.createElement('div');
    ring.className = 'highlight-ring clip';
    ring.setAttribute('data-start', '0.4');
    ring.setAttribute('data-duration', String(Math.max(duration - 0.4, 2.6)));
    ring.style.left = highlight.x + 'px';
    ring.style.top = highlight.y + 'px';
    layer.appendChild(ring);

    if (highlight.label) {
      const hlabel = document.createElement('div');
      hlabel.className = 'highlight-label clip';
      hlabel.setAttribute('data-start', '0.4');
      hlabel.setAttribute('data-duration', String(Math.max(duration - 0.4, 2.6)));
      hlabel.style.left = highlight.x + 'px';
      hlabel.style.top = (highlight.y + 28) + 'px';
      hlabel.textContent = highlight.label;
      layer.appendChild(hlabel);
    }
  }

  // 渲染卡片
  const cardsArea = document.getElementById('cards-area');
  cards.forEach(function(card) {
    const cardEl = document.createElement('div');
    cardEl.className = 'card ' + (card.type || 'term');
    if (card.type === 'data') {
      cardEl.innerHTML = '<div class="card-title">' + (card.title || '') + '</div>' +
                         '<div class="card-value">' + (card.value || '') + '</div>';
    } else {
      cardEl.innerHTML = '<div class="card-title">' + (card.title || '') + '</div>' +
                         (card.sub ? '<div class="card-sub">' + card.sub + '</div>' : '');
    }
    cardsArea.appendChild(cardEl);
  });
})();
</script>

</body>
</html>
